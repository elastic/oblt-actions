name: Observability Agentic Workflow — Issue Fixer

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  run-aw:
    permissions:
      actions: read
      contents: write
      discussions: write
      issues: write
      pull-requests: write
    uses: elastic/oblt-aw/.github/workflows/oblt-aw-issue-fixer.yml@main # ratchet:exclude
    secrets: inherit

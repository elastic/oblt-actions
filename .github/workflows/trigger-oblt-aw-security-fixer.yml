name: Observability Agentic Workflow — Security Fixer

on:
  issues:
    types: [labeled]

permissions:
  contents: read

jobs:
  run-aw:
    permissions:
      actions: read
      contents: write
      discussions: write
      issues: write
      pull-requests: write
    uses: elastic/oblt-aw/.github/workflows/oblt-aw-security-fixer.yml@main # ratchet:exclude
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

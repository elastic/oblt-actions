name: Observability Agentic Workflow — Mention in Issue

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  run-aw:
    permissions:
      actions: read
      contents: write
      discussions: write
      issues: write
      pull-requests: write
    uses: elastic/oblt-aw/.github/workflows/oblt-aw-mention-in-issue.yml@main # ratchet:exclude
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

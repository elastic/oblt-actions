name: Observability Agentic Workflow — Autodoc

on:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  run-aw:
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    uses: elastic/oblt-aw/.github/workflows/oblt-aw-autodoc.yml@main # ratchet:exclude
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

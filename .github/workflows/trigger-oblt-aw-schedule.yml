name: Observability Agentic Workflow — Schedule

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-aw:
    permissions:
      actions: read
      contents: write
      copilot-requests: write
      id-token: write
      issues: write
      pull-requests: write
    uses: elastic/oblt-aw/.github/workflows/oblt-aw-event-schedule.yml@main # ratchet:exclude
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

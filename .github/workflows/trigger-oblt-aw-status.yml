name: Observability Agentic Workflow — Status

on:
  status:

permissions:
  contents: read

jobs:
  run-aw:
    if: >-
      github.event.state == 'failure' &&
      contains(github.event.context, 'buildkite')
    permissions:
      actions: read
      contents: read
      copilot-requests: write
      id-token: write
      issues: read
      pull-requests: write
    uses: elastic/oblt-aw/.github/workflows/oblt-aw-event-status.yml@main # ratchet:exclude
    secrets:
      BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_LOGS_API_TOKEN }}

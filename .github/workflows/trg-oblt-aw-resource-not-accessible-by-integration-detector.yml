name: Observability Agentic Workflow — Resource Not Accessible Detector

on:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  run-aw:
    permissions:
      actions: read
      contents: read
      issues: write
    uses: elastic/oblt-aw/.github/workflows/oblt-aw-resource-not-accessible-by-integration-detector.yml@main # ratchet:exclude
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

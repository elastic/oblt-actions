name: test-buildkite-flaky-report

on:
  merge_group: ~
  workflow_dispatch: ~
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/test-buildkite-flaky-report.yml'
      - 'buildkite/flaky-report/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test-buildkite-flaky-report.yml'
      - 'buildkite/flaky-report/**'

permissions:
  contents: read

jobs:
  test:
    if: always()
    needs:
      - test-no-wait-for
      - test-wait-for
    runs-on: ubuntu-slim
    steps:
      - id: check
        uses: elastic/oblt-actions/check-dependent-jobs@v1
        with:
          jobs: ${{ toJSON(needs) }}
      - run: ${{ steps.check.outputs.is-success }}

  test-no-wait-for:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./buildkite/flaky-report
        with:
          github-repo: 'elastic/beats'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          org: 'elastic'
          test-suite-id: 'beats'
          token: ${{ secrets.BUILDKITE_TOKEN }}

  test-wait-for:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - id: buildkite
        uses: ./buildkite/flaky-report
        with:
          github-repo: 'elastic/beats'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          org: 'elastic'
          test-suite-id: 'beats'
          token: ${{ secrets.BUILDKITE_TOKEN }}

      - name: Assert is oblt-hello-world
        run: test "${{ steps.buildkite.outputs.flaky-test-count }}" = "0"

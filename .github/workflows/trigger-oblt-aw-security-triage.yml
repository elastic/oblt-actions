name: Observability Agentic Workflow — Security Triage

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read

jobs:
  run-aw:
    permissions:
      actions: read
      contents: read
      discussions: write
      id-token: write
      issues: write
      pull-requests: write
    uses: elastic/oblt-aw/.github/workflows/oblt-aw-security-triage.yml@main # ratchet:exclude
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

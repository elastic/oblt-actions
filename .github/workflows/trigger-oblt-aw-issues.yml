name: Observability Agentic Workflow — Issues

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-oblt-aw-issues:
    permissions:
      actions: read
      contents: write
      copilot-requests: write
      discussions: write
      id-token: write
      issues: write
      pull-requests: write
    uses: elastic/oblt-aw/.github/workflows/oblt-aw-event-issues.yml@main # ratchet:exclude

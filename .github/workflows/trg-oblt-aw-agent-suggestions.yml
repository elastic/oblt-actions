name: Observability Agentic Workflow — Agent Suggestions

on:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  run-aw:
    permissions:
      contents: read
      issues: write
      pull-requests: read
    uses: elastic/oblt-aw/.github/workflows/oblt-aw-agent-suggestions.yml@main # ratchet:exclude
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

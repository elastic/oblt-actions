name: Observability Agentic Workflow Trigger

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  status:

permissions:
  contents: read

concurrency:
  group: oblt-aw-trigger-${{ github.event.pull_request.number || github.event.issue.number || github.event.schedule || github.sha }}
  cancel-in-progress: true

jobs:
  dispatch-entrypoint:
    permissions:
      actions: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch oblt-aw entrypoint
        id: dispatch
        uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 # v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          workflow: oblt-aw.yml
          inputs: |
            {
              "trigger-source": ${{ toJSON(github.workflow) }},
              "event-name": ${{ toJSON(github.event_name) }},
              "event-action": ${{ toJSON(github.event.action || '') }},
              "event-payload-json": ${{ toJSON(toJSON(github.event)) }},
              "caller-ref": ${{ toJSON(github.ref) }},
              "caller-sha": ${{ toJSON(github.sha) }},
              "caller-run-id": ${{ toJSON(github.run_id) }}
            }

      - name: Post entrypoint run link on PR commit
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ steps.dispatch.outputs.runUrlHtml }}
          STATUS_CONTEXT: oblt-aw/entrypoint
        run: |
          gh api \
            --method POST \
            "/repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state=success \
            -f target_url="${RUN_URL}" \
            -f description='oblt-aw entrypoint dispatched (open run for progress)' \
            -f context="${STATUS_CONTEXT}"

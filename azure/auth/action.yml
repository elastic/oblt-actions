---
name: azure-auth
description: |
  Authenticate to Azure using a service principal with OIDC.

  The action also exports Terraform-compatible Azure environment variables for downstream
  steps: ARM_SUBSCRIPTION_ID, ARM_TENANT_ID, ARM_CLIENT_ID, and ARM_USE_OIDC.
author: Elastic Observability Team
inputs:
  subscription-id:
    description: The Azure subscription ID to authenticate to.
    required: true
  tenant-id:
    description: The Azure tenant ID.
    required: true
  client-id:
    description: The Azure client ID (Service Principal).
    required: true
outputs:
  ARM_SUBSCRIPTION_ID:
    description: Azure subscription ID exported as ARM_SUBSCRIPTION_ID for downstream steps.
    value: ${{ inputs.subscription-id }}
  ARM_TENANT_ID:
    description: Azure tenant ID exported as ARM_TENANT_ID for downstream steps.
    value: ${{ inputs.tenant-id }}
  ARM_CLIENT_ID:
    description: Azure client ID exported as ARM_CLIENT_ID for downstream steps.
    value: ${{ inputs.client-id }}
  ARM_USE_OIDC:
    description: Set to true and exported as ARM_USE_OIDC for downstream OIDC workflows.
    value: ${{ 'true' }}

runs:
  using: "composite"
  steps:
    - name: Azure login
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        client-id: ${{ inputs.client-id }}
        tenant-id: ${{ inputs.tenant-id }}
        subscription-id: ${{ inputs.subscription-id }}

    - name: Set outputs
      uses: actions/github-script@v9.0.0
      env:
        SUBSCRIPTION_ID: ${{ inputs.subscription-id }}
        TENANT_ID: ${{ inputs.tenant-id }}
        CLIENT_ID: ${{ inputs.client-id }}
      with:
        script: |
          core.exportVariable('ARM_SUBSCRIPTION_ID', process.env.SUBSCRIPTION_ID);
          core.exportVariable('ARM_TENANT_ID', process.env.TENANT_ID);
          core.exportVariable('ARM_CLIENT_ID', process.env.CLIENT_ID);
          core.exportVariable('ARM_USE_OIDC', 'true');

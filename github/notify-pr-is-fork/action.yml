name: 'github/notify-pr-is-fork'

description: 'Notify that the pull request is from a fork and that e2e tests require a feature branch in the main repository.'

inputs:
  github-token:
    description: 'The GitHub access token.'
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Notify GitHub running on a fork
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          core.warning('In order to run this workflow you must create a feature branch in the main repo.')

          if (!context.issue || !context.issue.number) {
            core.info('Not in a pull request context, skipping comment.')
            return
          }

          const marker = '<!-- elastic/oblt-actions/github/notify-pr-is-fork -->'
          const body = [
            marker,
            '## :warning: Fork detected',
            '',
            'This pull request is from a fork. In order to run the e2e tests, you must create a feature branch in the main repository.',
            'Forks are not supported for running the e2e tests.',
          ].join('\n')

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          })

          const existing = comments.find(c => c.body && c.body.includes(marker))

          if (!existing) {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            })
          }

name: 'oblt-cli/run'
description: 'Run the oblt-cli wrapper.'
inputs:
  command:
    description: 'The oblt-cli command to run'
    required: true
  github-token:
    description: 'The GitHub access token.'
    required: true
  slack-channel:
    description: 'The slack channel to notify the status.'
    default: '#observablt-bots'
    required: false
  username:
    description: 'Username to show in the deployments with oblt-cli. oblt-cli/setup lowercases the value and strips characters outside [a-z0-9_-]. Defaults to the GitHub repository name (without the owner prefix).'
    required: false
runs:
  using: "composite"
  steps:
    - uses: elastic/oblt-actions/oblt-cli/setup@v1.39.5
      with:
        github-token: ${{ inputs.github-token }}
        slack-channel: ${{ inputs.slack-channel }}
        username: ${{ inputs.username }}
    - name: run oblt-cli
      run: oblt-cli --verbose ${COMMAND}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        COMMAND: ${{ inputs.command }}
